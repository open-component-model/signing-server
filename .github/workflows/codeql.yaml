name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 07:25 UTC
    - cron: "25 7 * * 1"

# Top-level permissions: restrict to read-only by default.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      # Required to upload CodeQL results to the Security tab.
      security-events: write
      # Required to check out the repository.
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
          - language: actions

    env:
      # This repository uses CGO (github.com/miekg/pkcs11).
      CGO_ENABLED: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        if: matrix.language == 'go'
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          category: "/language:${{ matrix.language }}"
